{
    "condition": "tint_build_fuzzer_vulkan_support && tint_build_wgsl_reader && tint_build_mesa",
    "fuzz_cmd": {
        /* The Tint fuzzer executable for WGSL-input. */
        "OutputName": "tint_wgsl_mesa_fuzzer",
        "AdditionalDependencies": {
            /* Depend on all the fuzz targets to pull them all together. */
            "Internal": [
                "**:fuzz",
                "cmd/fuzz/common"
            ],
            "External": [
                "dxcompiler-for-fuzzer",
                "mesa"
            ]
        }
    }
}
