<!doctype html>
<meta charset="utf-8">
<head>
  <script src="qrc:/qtwebchannel/qwebchannel.js"></script>
  <link rel="stylesheet" href="qrc:/res/css/github.css">
  <link rel="stylesheet" href="qrc:/res/css/github-markdown.css">
  <script src="qrc:/res/highlight.js"></script>
  <script>hljs.configure({languages:[]});</script>
  <link rel="stylesheet" href="qrc:/res/katex/katex.min.css">
  <script src="qrc:/res/katex/katex.min.js"></script>
  <script src="qrc:/res/katex/contrib/auto-render.min.js"></script>
  <script>
    let s_id = '';
    let s_ln = -1;

    function scrollToId(itemId) {
      const element = document.getElementById(itemId);

      if (element) {
        element.scrollIntoView({ block: "center" });
      } else {
        s_id = itemId;
        s_ln = -1;
      }
    }

    function scrollToLineInCode(preId, lineText) {
      const preElement = document.getElementById(preId);
      if (!preElement) {
        s_id = preId;
        s_ln = lineText;
        return;
      }

      const codeElement = preElement.querySelector('code');
      if (!codeElement) {
        s_id = preId;
        s_ln = lineText;
        return;
      }

      const lineIndex = parseInt(lineText, 10);
      const targetLine = codeElement.querySelectorAll('.code-line')[lineIndex];
      if (targetLine) {
        targetLine.scrollIntoView({ block: "center" });
      }
    }

    function getId(x, y) {
        var elem = document.elementFromPoint(x, y);
        var topParent = elem;

        while (topParent && topParent.parentElement && topParent.parentElement.tagName !== 'ARTICLE') {
            topParent = topParent.parentElement;
        }

        return topParent ? topParent.id : null;
    }
  </script>
</head>
<body>
  <div id="placeholder"></div>
  <script type="module">
  import { replaceBadges } from "qrc:/res/hightlight-blockquote.js";
  (() => {
  'use strict';

  let placeholder = document.getElementById('placeholder');

  let scroll = function() {
    if (s_id) {
      if (s_ln != -1) {
        scrollToLineInCode(s_id, s_ln);
        s_id = '';
        s_ln = -1;
      } else {
        scrollToId(s_id);
        s_id = '';
      }
    }
  }

  let prepareCode = function() {
    const allCodeElements = document.querySelectorAll('pre code');

    allCodeElements.forEach((codeElement) => {
      const htmlLines = codeElement.innerHTML.replace(/\n$/, '').split('\n');

      codeElement.innerHTML = htmlLines
        .map(lineHtml => `<div class="code-line">${lineHtml || '&nbsp;'}</div>`)
        .join('');
    });
  }

  let updateText = function(text) {
     placeholder.innerHTML = text;
     hljs.highlightAll();
     renderMathInElement(document.body, {
         delimiters: [
             {left: '$$', right: '$$', display: true},
             {left: '$', right: '$', display: false},
         ],
         throwOnError : false,
         strict : false,
         trust : true
     });
     replaceBadges(placeholder);
     prepareCode();
     scroll();
  }

  new QWebChannel(qt.webChannelTransport,
	function(channel) {
	  let content = channel.objects.content;
	  updateText(content.text);
	  content.textChanged.connect(updateText);
	}
  );
  })();</script>
</body>
</html>
